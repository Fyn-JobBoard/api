name: Fyn API - Production

services:
  db:
    image: postgres:18-alpine
    env_file:
      - path: postgres.env.production.local
        required: false
    environment:
      POSTGRES_DB: fyn
      POSTGRES_USER: fynprod
      POSTGRES_PASSWORD: 'DBPassword-1234'
    volumes:
      - db-data-prod:/var/lib/postgresql/18
    expose:
      - 5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fynprod -d fyn']
      interval: 2s
      timeout: 3s
      retries: 5
    command: -p 5432
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env.production.local
        required: false
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    expose:
      - 3000
    healthcheck:
      test: ['CMD', 'curl', '-sfo', '/dev/null', 'http://localhost:3000/v1']
      start_interval: 3s
      start_period: 10s
      interval: 5s

volumes:
  db-data-prod:
