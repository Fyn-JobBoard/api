name: Fyn - Developpement

services:
  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_DB=fyn
      - POSTGRES_USER=postgres
    volumes:
      - db-data:/var/lib/postgresql/18
    ports:
      - 5432:5432
    expose:
      - 5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 3s
      retries: 5
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      - DB_HOST=db
    volumes:
      - ./src:/app/src
      - ./db:/app/db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 3000:3000
    expose:
      - 3000
    healthcheck:
      test:
        ['CMD', 'curl', '-sfo', '/dev/null', 'http://localhost:3000/v1']
      start_interval: 3s
      start_period: 10s
      interval: 5s

volumes:
  db-data:
